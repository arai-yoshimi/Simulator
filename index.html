<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年度版・業務改善助成金統合管理台帳</title>
    <style>
        :root { --primary: #0369a1; --bg: #f8fafc; --card: #ffffff; --border: #cbd5e1; --danger: #dc2626; --success: #16a34a; --subsidy: #059669; }
        body { font-family: sans-serif; background-color: var(--bg); color: #1e293b; padding: 20px; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); }
        h1 { font-size: 1.4rem; color: #0c4a6e; text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        
        .exclusion-box { background: #fff1f2; border: 1px solid #fda4af; border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 0.8rem; color: #991b1b; }
        .config-panel { background: #f0f9ff; border: 1px solid var(--primary); padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 25px; }
        .form-section { border-right: 1px solid #e2e8f0; padding-right: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 0.85rem; color: #475569; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #94a3b8; border-radius: 4px; box-sizing: border-box; }
        
        .allowance-row { display: grid; grid-template-columns: 1.5fr 1fr auto; gap: 5px; margin-bottom: 5px; }
        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 10px 15px; font-weight: bold; transition: opacity 0.2s; }
        .btn-add-allow { background: #64748b; color: white; padding: 4px 8px; font-size: 0.75rem; margin-top: 5px; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 20px; }
        .btn-export { background: var(--success); color: white; }
        .btn-del { background: #ef4444; color: white; padding: 4px 8px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 0.8rem; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        th { background: #e2e8f0; }
        .status-ok { color: var(--success); font-weight: bold; }
        .status-ng { color: var(--danger); font-weight: bold; }
        .small-note { font-size: 0.7rem; color: #64748b; font-weight: normal; }

        /* 受給額シミュ用スタイル */
        .subsidy-card { background: #ecfdf5; border: 2px solid var(--subsidy); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .subsidy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; }
        .subsidy-result { background: white; padding: 15px; border-radius: 8px; border: 1px solid #6ee7b7; margin-top: 15px; display: flex; justify-content: space-around; align-items: center; }
        .subsidy-val { font-size: 2rem; font-weight: 800; color: #065f46; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>📊 賃金計算管理台帳 兼 助成金シミュレーター</h1>

        <div class="exclusion-box">
            <strong>⚠️ 含めない手当：</strong> 通勤手当、家族手当、住宅手当(実費分)、精皆勤手当、賞与、残業代等
        </div>

        <div class="config-panel">
            <label>適用都道府県:</label>
            <select id="global_pref" onchange="updateMinWage()"></select>
            <span>地域最低賃金: <strong id="min_wage_disp">---</strong> 円</span>
        </div>

        <div class="input-grid">
            <div class="form-section">
                <h3 style="margin-top:0; border-left:4px solid var(--primary); padding-left:10px;">1. 従業員基本情報</h3>
                <div class="form-group"><label>従業員コード</label><input type="text" id="emp_code" placeholder="001"></div>
                <div class="form-group"><label>氏名</label><input type="text" id="name" placeholder="労働 太郎"></div>
                <div class="form-group"><label>入社年月日</label><input type="date" id="hire_date"></div>
                
                <h3 style="margin-top:20px; border-left:4px solid var(--primary); padding-left:10px;">2. 時給・日給</h3>
                <div class="form-group"><label>基本時給 (円)</label><input type="number" id="h_pay" value="0"></div>
                <div class="form-group" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>基本日給 (円)</label><input type="number" id="d_pay" value="0"></div>
                    <div><label>1日所定労働時間</label><input type="number" id="d_hours" value="8"></div>
                </div>
            </div>

            <div>
                <h3 style="margin-top:0; border-left:4px solid var(--primary); padding-left:10px;">3. 月給・固定手当 <span class="small-note">※時給者も含む</span></h3>
                <div class="form-group" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>基本月給 (円)</label><input type="number" id="base_pay" value="0"></div>
                    <div><label>月平均所定労働時間 (h)</label><input type="number" id="m_hours" value="160"></div>
                </div>
                
                <label>固定手当（月額） <span class="small-note">役職・職務・固定住宅・資格・営業・食事等</span></label>
                <div id="allowance_container"></div>
                <button class="btn btn-add-allow" onclick="addAllowance()">＋ 手当を追加</button>

                <button class="btn btn-main" onclick="addEmployee()">計算結果をリストに追加</button>
            </div>
        </div>
    </div>

    <div class="subsidy-card">
        <h3 style="margin-top:0; border-left:4px solid var(--subsidy); padding-left:10px; color:#065f46;">💰 業務改善助成金・受給額予想 (2026年度/令和8年度版)</h3>
        <div class="subsidy-grid">
            <div class="form-group">
                <label>事業場内最低賃金 (現在)</label>
                <input type="number" id="sub_min" placeholder="一番低い人の時給" oninput="calcSub()">
            </div>
            <div class="form-group">
                <label>引上げ額コース</label>
                <select id="sub_course" onchange="calcSub()">
                    <option value="50">50円コース</option>
                    <option value="70">70円コース</option>
                    <option value="90">90円コース</option>
                </select>
            </div>
            <div class="form-group">
                <label>引き上げる労働者数</label>
                <input type="number" id="sub_count" value="1" min="1" oninput="calcSub()">
            </div>
            <div class="form-group">
                <label>事業場規模</label>
                <select id="sub_size" onchange="calcSub()">
                    <option value="small">30人未満の事業者</option>
                    <option value="large">右記(30人未満)以外の事業者</option>
                </select>
            </div>
            <div class="form-group">
                <label>設備投資額 (税抜)</label>
                <input type="number" id="sub_invest" value="0" oninput="calcSub()">
            </div>
            <div class="form-group">
                <label>特例事業者 (10人以上時)</label>
                <select id="sub_special" onchange="calcSub()">
                    <option value="no">該当しない</option>
                    <option value="yes">特例事業者に該当</option>
                </select>
            </div>
        </div>
        <div class="subsidy-result">
            <div style="text-align:center;">
                <span class="small-note">適用助成率</span><br>
                <strong id="sub_rate_disp" style="font-size:1.1rem;">---</strong>
            </div>
            <div style="text-align:center;">
                <span class="small-note">予想受給額</span><br>
                <span class="subsidy-val" id="sub_val">0</span> <span style="font-weight:bold; color:#065f46;">円</span>
            </div>
            <div style="text-align:center;">
                <span class="small-note">助成上限額</span><br>
                <strong id="sub_limit_disp" style="font-size:1.1rem;">---</strong>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>👥 従業員賃金計算一覧</h2>
            <button class="btn btn-export" onclick="exportToCSV()">Excel用CSV出力</button>
        </div>
        <div style="overflow-x:auto;">
            <table id="emp_table">
                <thead>
                    <tr>
                        <th>コード</th><th>氏名</th><th>入社日</th><th>月給換算</th><th>日給換算</th><th>基本時給</th><th>最終時給換算額</th><th>判定</th><th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const minWages = { "東京都":1226, "神奈川県":1225, "大阪府":1177, "埼玉県":1141, "千葉県":1140, "愛知県":1140, "京都府":1122, "兵庫県":1116, "静岡県":1097, "三重県":1087, "広島県":1085, "滋賀県":1080, "北海道":1075, "茨城県":1074, "栃木県":1068, "岐阜県":1065, "群馬県":1063, "富山県":1062, "長野県":1061, "福岡県":1057, "石川県":1054, "福井県":1053, "山梨県":1052, "奈良県":1051, "岡山県":1050, "山口県":1047, "徳島県":1046, "和歌山県":1045, "香川県":1036, "大分県":1035, "熊本県":1034, "島根県":1033, "新潟県":1033, "山形県":1032, "秋田県":1031, "岩手県":1031, "長崎県":1031, "福島県":1030, "佐賀県":1030, "鳥取県":1030, "青森県":1029, "鹿児島県":1026, "宮崎県":1023, "沖縄県":1023, "高知県":1023 };

let employees = [];

function init() {
    const sel = document.getElementById('global_pref');
    Object.keys(minWages).sort().forEach(p => {
        let o = document.createElement('option'); o.value = p; o.text = p;
        if(p === "東京都") o.selected = true;
        sel.appendChild(o);
    });
    updateMinWage();
}

function updateMinWage() {
    document.getElementById('min_wage_disp').innerText = minWages[document.getElementById('global_pref').value];
}

function addAllowance() {
    const container = document.getElementById('allowance_container');
    const div = document.createElement('div');
    div.className = 'allowance-row';
    div.innerHTML = `<select><option>役職手当</option><option>職務手当</option><option>住宅手当(固定)</option><option>資格手当</option></select><input type="number" class="allow_val" value="0"><button class="btn btn-del" onclick="this.parentElement.remove()">✕</button>`;
    container.appendChild(div);
}

/** 従業員賃金計算（機能維持） **/
function addEmployee() {
    const code = document.getElementById('emp_code').value;
    const name = document.getElementById('name').value;
    const hireDate = document.getElementById('hire_date').value;
    if(!name) { alert("氏名を入力してください"); return; }
    const mHours = parseFloat(document.getElementById('m_hours').value) || 0;
    const basePay = parseFloat(document.getElementById('base_pay').value) || 0;
    let allowSum = 0;
    document.querySelectorAll('.allow_val').forEach(el => allowSum += parseFloat(el.value) || 0);
    const mEquivalent = mHours > 0 ? (basePay + allowSum) / mHours : 0;
    const dPay = parseFloat(document.getElementById('d_pay').value) || 0;
    const dHours = parseFloat(document.getElementById('d_hours').value) || 1;
    const dEquivalent = dPay / dHours;
    const hPay = parseFloat(document.getElementById('h_pay').value) || 0;
    const total = Math.floor(mEquivalent + dEquivalent + hPay);
    const minWage = minWages[document.getElementById('global_pref').value];
    employees.push({ code, name, hireDate, basePay, allowSum, mHours, mEquivalent, dPay, dHours, dEquivalent, hPay, total, minWage });
    renderTable();
    document.getElementById('emp_code').value = ""; document.getElementById('name').value = "";
}

/** 2026年度版 受給額シミュレーションロジック **/
function calcSub() {
    const min = parseFloat(document.getElementById('sub_min').value) || 0;
    const course = parseInt(document.getElementById('sub_course').value);
    const count = parseInt(document.getElementById('sub_count').value) || 0;
    const size = document.getElementById('sub_size').value;
    const special = document.getElementById('sub_special').value;
    const invest = parseFloat(document.getElementById('sub_invest').value) || 0;

    // 助成率
    let rate = (min < 1050) ? 0.8 : 0.75;
    document.getElementById('sub_rate_disp').innerText = (rate === 0.8) ? "4/5 (80%)" : "3/4 (75%)";

    // 上限額テーブル
    const table = {
        50: { small: [40, 70, 70, 90, 110, 130], large: [30, 40, 70, 90, 110, 130] },
        70: { small: [50, 100, 130, 180, 230, 300], large: [40, 50, 130, 180, 230, 300] },
        90: { small: [100, 240, 270, 360, 450, 600], large: [90, 150, 270, 360, 450, 600] }
    };

    let idx = 0; // 1人
    if (count >= 10 && special === 'yes') idx = 5;
    else if (count >= 8) idx = 4;
    else if (count >= 6) idx = 3;
    else if (count >= 4) idx = 2;
    else if (count >= 2) idx = 1;

    const limit = table[course][size][idx] * 10000;
    document.getElementById('sub_limit_disp').innerText = limit.toLocaleString() + " 円";
    document.getElementById('sub_val').innerText = Math.min(Math.floor(invest * rate), limit).toLocaleString();
}

function renderTable() {
    const tbody = document.getElementById('emp_table').querySelector('tbody');
    tbody.innerHTML = "";
    employees.forEach((e, i) => {
        const row = tbody.insertRow();
        row.innerHTML = `<td>${e.code}</td><td>${e.name}</td><td>${e.hireDate}</td><td>${Math.floor(e.mEquivalent)}円</td><td>${Math.floor(e.dEquivalent)}円</td><td>${e.hPay}円</td><td><strong>${e.total.toLocaleString()}円</strong></td><td class="${e.total >= e.minWage ? 'status-ok' : 'status-ng'}">${e.total >= e.minWage ? 'クリア' : '不足'}</td><td><button class="btn btn-del" onclick="employees.splice(${i},1); renderTable();">削除</button></td>`;
    });
}

function exportToCSV() {
    let csv = "\uFEFFコード,氏名,入社年月日,月換算,最終換算額,判定\n";
    employees.forEach(e => csv += `${e.code},${e.name},${e.hireDate},${Math.floor(e.mEquivalent)},${e.total},${e.total >= e.minWage ? "OK" : "NG"}\n`);
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob); link.download = "賃金計算リスト.csv"; link.click();
}
window.onload = init;
</script>
</body>
</html>
